name: Test

on: [push]


permissions: {}

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.21', '1.22']
    name: Go ${{ matrix.go }}
    services:
      dynamodb:
        image: amazon/dynamodb-local@sha256:6b954943dc44e9f0898a75e17192280f558550cf7651cf1b6546af9c55975526
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - name: Download gomodules
        run: go mod download
      - name: Run tests
        run: go test -v ./...
        env:
          AWS_ACCESS_KEY_ID: AKID
          AWS_SECRET_ACCESS_KEY: SECRET

